name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build web assets
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor Android project
        working-directory: frontend
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      # zip 없이 폰 브라우저에서 바로 apk를 다운로드할 수 있도록, Actions 아티팩트와 별도로
      # "android-latest"라는 고정 태그의 Release에 apk 파일을 직접 첨부해 매번 덮어쓴다.
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete android-latest --yes --cleanup-tag || true
          gh release create android-latest \
            frontend/android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Android APK (최신)" \
            --notes "자동 빌드된 최신 APK. 링크를 눌러 apk 파일을 바로 다운로드하세요."
