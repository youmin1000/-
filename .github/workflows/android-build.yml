name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build web assets
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor Android project
        working-directory: frontend
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      # zip 없이 폰 브라우저에서 바로 apk를 다운로드할 수 있도록, Actions 아티팩트와 별도로
      # "android-latest"라는 고정 태그의 Release에 apk 파일을 직접 첨부해 매번 덮어쓴다.
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete android-latest --yes --cleanup-tag || true
          gh release create android-latest \
            frontend/android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Android APK (최신)" \
            --notes "자동 빌드된 최신 APK. 링크를 눌러 apk 파일을 바로 다운로드하세요."

      # Play Console 업로드용 서명된 릴리즈 AAB. 키스토어 시크릿이 등록되기 전까지는 건너뛴다.
      - name: Decode release keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > frontend/android/app/release.keystore

      - name: Build signed release AAB
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload release AAB
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
