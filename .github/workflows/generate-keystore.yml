name: Generate Android Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias koreatravelroute \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "RCXDmYjraUQh2AHfNd81Y2J3" \
            -keypass "gTlgJV1TjxJgJ7CxFWrBlmrq" \
            -dname "CN=Korea Travel Route, OU=Personal, O=Personal, L=Seoul, S=Seoul, C=KR"
          base64 -w 0 release.keystore > release.keystore.b64

      - name: Upload keystore (base64)
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore-base64
          path: release.keystore.b64
          retention-days: 7
