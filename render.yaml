services:
  - type: web
    name: korea-travel-route-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: TMAP_APP_KEY
        sync: false
      - key: ODSAY_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: KTO_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
